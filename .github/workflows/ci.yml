name: CI

# Runs in the mirrored ls45-admin repo, where the Angular project is at the repo root.
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-test:
    name: Admin Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      # The production build is the strongest gate — it fails on any template
      # or TypeScript type error across the app.
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test -- --watch=false --browsers=ChromeHeadless
