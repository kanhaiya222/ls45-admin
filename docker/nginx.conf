# Serve the Angular admin SPA. API calls go straight to the backend at http://localhost:8080
# (handled by the browser + CORS), so nginx only needs to serve static files with an SPA fallback.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted assets.
    location ~* \.(?:js|css|woff2?|png|jpe?g|svg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: every other path falls back to index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
