<div class="login">
  <div class="login__card">
    <div class="login__brand">
      <span class="login__mark">LS45</span>
      <span class="login__name">Admin</span>
    </div>
    <h1 class="login__title">Sign in</h1>
    <p class="login__sub">Manage wellness journeys, departures and bookings.</p>

    @if (error()) {
      <div class="login__error" role="alert">{{ error() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="field">
        <span class="field__label">Email</span>
        <input type="email" formControlName="email" autocomplete="email" placeholder="admin@example.com" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <span class="field__err">Enter a valid email address.</span>
        }
      </label>

      <label class="field">
        <span class="field__label">Password</span>
        <input type="password" formControlName="password" autocomplete="current-password" />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <span class="field__err">Password is required.</span>
        }
      </label>

      <button class="btn-primary login__submit" type="submit" [disabled]="submitting()">
        {{ submitting() ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>
  </div>
</div>
