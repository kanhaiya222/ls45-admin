<div class="shell">
  <aside class="sidebar">
    <div class="sidebar__brand">
      <span class="sidebar__mark">LS45</span>
      <span class="sidebar__name">Admin</span>
    </div>
    <nav class="sidebar__nav">
      <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M3 3h8v8H3zm10 0h8v5h-8zm0 7h8v11h-8zM3 13h8v8H3z"/></svg>
        Dashboard
      </a>
      <a routerLink="/packages" routerLinkActive="is-active">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M12 2l9 5v10l-9 5-9-5V7zm0 2.3L5 8v8l7 3.9L19 16V8z"/></svg>
        Packages
      </a>
      <a routerLink="/bookings" routerLinkActive="is-active">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M7 2v2h10V2h2v2h3v18H2V4h3V2zm13 8H4v10h16zM6 12h5v4H6z"/></svg>
        Bookings
      </a>
      <a routerLink="/reports" routerLinkActive="is-active">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M4 13h4v8H4zm6-6h4v14h-4zm6 3h4v11h-4z"/></svg>
        Reports
      </a>
      <a routerLink="/taxonomy" routerLinkActive="is-active">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M10 2l10 10-8 8L2 10V2zm-3 3.5A1.5 1.5 0 105.5 7 1.5 1.5 0 007 5.5z"/></svg>
        Taxonomy
      </a>
      <a routerLink="/content/pages" routerLinkActive="is-active">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M6 2h9l5 5v15H6zm8 1.5V8h4.5zM8 12h8v2H8zm0 4h8v2H8z"/></svg>
        Content
      </a>
      <a routerLink="/content/blog" routerLinkActive="is-active">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M3 17.2V21h3.8L18 9.8 14.2 6zM20.7 7a1 1 0 000-1.4L18.4 3.3a1 1 0 00-1.4 0l-1.8 1.8L19 8.8z"/></svg>
        Blog
      </a>
    </nav>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar__spacer"></div>
      @if (user(); as u) {
        <span class="topbar__user">{{ u.firstName }} {{ u.lastName }}</span>
      }
      <button class="btn-outline" type="button" (click)="logout()">Log out</button>
    </header>
    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
