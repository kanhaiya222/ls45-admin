<div class="shell">
  <aside class="sidebar">
    <div class="sidebar__brand">
      <span class="sidebar__mark">LS45</span>
      <span class="sidebar__name">Admin</span>
    </div>
    <nav class="sidebar__nav">
      <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">
        Dashboard
      </a>
      <a routerLink="/packages" routerLinkActive="is-active">Packages</a>
      <a routerLink="/bookings" routerLinkActive="is-active">Bookings</a>
      <a routerLink="/reports" routerLinkActive="is-active">Reports</a>
      <a routerLink="/taxonomy" routerLinkActive="is-active">Taxonomy</a>
      <a routerLink="/content/pages" routerLinkActive="is-active">Content</a>
      <a routerLink="/content/blog" routerLinkActive="is-active">Blog</a>
    </nav>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar__spacer"></div>
      @if (user(); as u) {
        <span class="topbar__user">{{ u.firstName }} {{ u.lastName }}</span>
      }
      <button class="btn-outline" type="button" (click)="logout()">Log out</button>
    </header>
    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
