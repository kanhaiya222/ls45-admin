<div class="shell" [class.is-collapsed]="collapsed()" [class.is-mobile-open]="mobileOpen()">
  <!-- Mobile drawer backdrop -->
  <div class="backdrop" (click)="closeMobile()" aria-hidden="true"></div>

  <aside class="sidebar">
    <div class="sidebar__brand">
      <span class="sidebar__mark">LS45</span>
      <span class="sidebar__name">Admin</span>
    </div>

    <nav class="sidebar__nav">
      @for (g of groups; track g.label) {
        <p class="sb-section">{{ g.label }}</p>
        @for (it of g.items; track it.route) {
          <a
            [routerLink]="it.route"
            routerLinkActive="is-active"
            [routerLinkActiveOptions]="{ exact: !!it.exact }"
            (click)="closeMobile()"
            [attr.title]="it.label">
            <svg class="sb-ic" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path fill="currentColor" [attr.d]="iconPath(it.icon)" />
            </svg>
            <span class="sb-label">{{ it.label }}</span>
          </a>
        }
      }
    </nav>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="iconbtn topbar__burger" type="button" (click)="onMenuToggle()" aria-label="Toggle navigation">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/></svg>
      </button>
      <div class="topbar__spacer"></div>
      @if (user(); as u) {
        <span class="topbar__user">{{ u.firstName }} {{ u.lastName }}</span>
      }
      <button class="btn-outline" type="button" (click)="logout()">Log out</button>
    </header>
    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
