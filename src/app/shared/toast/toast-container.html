<div class="toasts" aria-live="polite" aria-atomic="false">
  @for (t of toasts(); track t.id) {
    <div class="toast toast--{{ t.kind }}" role="status">
      <span class="toast__ic" aria-hidden="true">
        @switch (t.kind) {
          @case ('success') { <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M9 16.2l-3.5-3.5L4 14.2 9 19.2 20 8.2l-1.5-1.5z"/></svg> }
          @case ('error') { <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 15h-2v-2h2zm0-4h-2V7h2z"/></svg> }
          @default { <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 15h-2v-6h2zm0-8h-2V7h2z"/></svg> }
        }
      </span>
      <span class="toast__text">{{ t.text }}</span>
      <button class="toast__close" type="button" (click)="dismiss(t.id)" aria-label="Dismiss">×</button>
    </div>
  }
</div>
